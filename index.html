<style>
  :root{
    --bg-1:#33101f; --bg-2:#1c0915; --bg-3:#42172a;
    --paper:#fff3ee; --paper-edge:#f2d8cd;
    --ink:#3c1622; --ink-soft:#8a5564;
    --accent-a:#e3a23c;        /* you — warm gold */
    --accent-b:#ff5d8f;        /* her — flirty rose */
    --gold:#f0c97a;
    --muted:#dcaebb;
    --line:rgba(255,255,255,.10);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(60% 45% at 12% -5%, #532038 0%, transparent 60%),
      radial-gradient(55% 40% at 105% 15%, #4a1830 0%, transparent 55%),
      linear-gradient(160deg, var(--bg-1), var(--bg-2) 70%);
    color:var(--muted); font-family:'Inter',sans-serif;
    min-height:100vh; -webkit-font-smoothing:antialiased; position:relative; overflow-x:hidden;
  }
  *:focus-visible{ outline:2px solid var(--gold); outline-offset:3px; border-radius:4px; }
  a{color:inherit;}

  /* ---------- ambient hearts / sparkles ---------- */
  .ambient{ position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:0; }
  .heart-p{ position:absolute; bottom:-10vh; opacity:0; will-change:transform,opacity;
    animation:floatUp linear infinite; }
  .heart-p svg{ width:100%; height:100%; display:block; }
  @keyframes floatUp{
    0%{ transform:translateY(0) translateX(0) rotate(0deg); opacity:0; }
    8%{ opacity:var(--maxop,.3); }
    88%{ opacity:var(--maxop,.3); }
    100%{ transform:translateY(-118vh) translateX(var(--drift,24px)) rotate(18deg); opacity:0; }
  }
  .spark{ position:absolute; border-radius:50%; background:var(--gold);
    animation:twinkle ease-in-out infinite; }
  @keyframes twinkle{ 0%,100%{opacity:.12; transform:scale(.7);} 50%{opacity:.85; transform:scale(1.2);} }

  /* ---------- splash ---------- */
  .splash{
    position:fixed; inset:0; z-index:50; display:flex; align-items:center; justify-content:center;
    background:
      radial-gradient(70% 55% at 50% 15%, #5a2440 0%, transparent 60%),
      linear-gradient(160deg, var(--bg-1), var(--bg-2) 75%);
    transition:opacity .6s ease, visibility .6s ease;
  }
  .splash.leaving{ opacity:0; visibility:hidden; pointer-events:none; }
  .splash-inner{ position:relative; z-index:2; text-align:center; padding:24px; max-width:420px; }
  .splash-heart{
    width:46px; height:46px; margin:0 auto 18px; color:var(--accent-b);
    animation:pulseHeart 1.8s ease-in-out infinite;
  }
  @keyframes pulseHeart{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.14); } }
  .splash-eyebrow{ font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--muted); opacity:.85; margin:0 0 14px; }
  .splash-title{
    font-family:'Fraunces',serif; font-style:italic; font-weight:500;
    font-size:clamp(30px,7vw,48px); color:#fff3ed; line-height:1.18; margin:0 0 16px; min-height:1.4em;
  }
  .caret{ display:inline-block; width:2px; background:var(--gold); margin-left:2px; animation:caretBlink 1s steps(1) infinite; }
  @keyframes caretBlink{ 0%,49%{opacity:1;} 50%,100%{opacity:0;} }
  .splash-sub{
    font-family:'Caveat',cursive; font-size:21px; color:var(--muted); margin:0 0 30px;
    opacity:0; transform:translateY(6px); transition:opacity .6s ease, transform .6s ease;
  }
  .splash-sub.show{ opacity:1; transform:none; }
  .enter-btn{
    font-family:'Inter',sans-serif; font-weight:700; font-size:14px; letter-spacing:.02em;
    color:#3c1622; background:linear-gradient(135deg, var(--gold), var(--accent-b));
    border:none; border-radius:999px; padding:14px 30px; cursor:pointer;
    opacity:0; transform:translateY(8px); transition:opacity .6s ease, transform .6s ease, box-shadow .2s;
    box-shadow:0 10px 28px rgba(255,93,143,.35);
  }
  .enter-btn.show{ opacity:1; transform:none; }
  .enter-btn:hover{ box-shadow:0 14px 34px rgba(255,93,143,.5); }

  /* ---------- main page ---------- */
  .wrap{ position:relative; z-index:1; max-width:1080px; margin:0 auto; padding:36px 18px 140px;
    opacity:0; transition:opacity .5s ease .1s; }
  .wrap.show{ opacity:1; }

  .eyebrow{ font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); text-align:center; margin:0 0 10px; }
  .title{ font-family:'Fraunces',serif; font-style:italic; font-weight:500; font-size:clamp(28px,6vw,44px);
    color:#fff3ed; text-align:center; margin:0; line-height:1.15; }
  .title .name{ cursor:pointer; border-bottom:1px dashed transparent; transition:border-color .15s; }
  .title .name:hover{ border-color:var(--muted); }
  .title .amp{ color:var(--accent-b); font-style:normal; padding:0 8px; }
  .rename-hint{ text-align:center; font-size:11px; color:#caa0ab; opacity:.7; margin:6px 0 0; }
  .string{ display:block; width:120px; height:14px; margin:18px auto 26px; border-top:1px dashed var(--line); position:relative; }
  .string::before,.string::after{ content:""; position:absolute; top:-4px; width:7px; height:7px; border-radius:50%; background:var(--accent-b); }
  .string::before{ left:0; } .string::after{ right:0; background:var(--gold); }

  .filters{ display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-bottom:30px; }
  .chip{ font-size:13px; font-weight:600; padding:8px 16px; border-radius:999px; border:1px solid var(--line);
    background:rgba(255,255,255,.04); color:var(--muted); cursor:pointer; transition:all .15s; }
  .chip:hover{ background:rgba(255,255,255,.08); }
  .chip.active{ background:#fff3ed; color:var(--ink); border-color:transparent; }

  .board{ column-count:1; column-gap:20px; }
  @media (min-width:640px){ .board{ column-count:2; } }
  @media (min-width:1020px){ .board{ column-count:3; } }

  .ticket{ break-inside:avoid; display:block; width:100%; margin:0 0 22px; background:var(--paper);
    border-radius:12px; position:relative; box-shadow:0 16px 30px -10px rgba(0,0,0,.5), 0 2px 6px rgba(0,0,0,.25);
    padding:24px 18px 16px; transition:transform .2s ease; }
  .ticket:nth-child(3n){ transform:rotate(-1.1deg); }
  .ticket:nth-child(3n+1){ transform:rotate(.9deg); }
  .ticket:nth-child(3n+2){ transform:rotate(-.4deg); }
  .ticket:hover{ transform:rotate(0deg) translateY(-2px); }

  .tape{ position:absolute; top:-9px; left:20px; width:56px; height:18px; border-radius:2px;
    transform:rotate(-6deg); box-shadow:0 3px 5px rgba(0,0,0,.3); opacity:.9; }
  .tape.a{ background:var(--accent-a); } .tape.b{ background:var(--accent-b); }

  .ticket-top{ display:flex; align-items:center; gap:10px; text-decoration:none; color:var(--ink); }
  .ticket-icon{ width:30px; height:30px; border-radius:8px; flex:none; display:flex; align-items:center; justify-content:center;
    background:rgba(60,22,34,.07); }
  .ticket-icon svg{ width:17px; height:17px; stroke:var(--ink); }
  .ticket-platform{ font-size:12px; font-weight:600; letter-spacing:.04em; text-transform:uppercase; color:var(--ink-soft); flex:1; }
  .ticket-open svg{ width:14px; height:14px; stroke:var(--ink-soft); }

  .perf{ border-top:2px dashed var(--paper-edge); margin:16px 0 14px; }
  .ticket-note{ font-family:'Caveat',cursive; font-weight:600; font-size:23px; line-height:1.3; color:var(--ink); margin:0 0 14px; word-break:break-word; }

  .ticket-footer{ display:flex; align-items:center; gap:8px; font-size:12px; color:var(--ink-soft); }
  .author-chip{ display:inline-flex; align-items:center; gap:6px; font-weight:600; }
  .author-dot{ width:8px; height:8px; border-radius:50%; flex:none; }
  .author-dot.a{ background:var(--accent-a); } .author-dot.b{ background:var(--accent-b); }
  .ticket-date{ margin-left:auto; opacity:.75; }
  .ticket-menu{ border:none; background:none; cursor:pointer; color:var(--ink-soft); font-size:16px; padding:2px 6px; line-height:1; border-radius:6px; }
  .ticket-menu:hover{ background:rgba(60,22,34,.1); }

  .empty{ text-align:center; padding:60px 20px; color:var(--muted); }
  .empty .ticket{ max-width:280px; margin:0 auto 18px; transform:rotate(-2deg); text-align:left; }
  .empty p{ font-size:13px; max-width:280px; margin:0 auto; line-height:1.5; }

  .status{ text-align:center; padding:60px 0; font-size:13px; letter-spacing:.04em; }
  .status.error{ color:var(--accent-b); padding:30px 20px; line-height:1.6; max-width:420px; margin:0 auto; }

  .fab{ position:fixed; right:20px; bottom:calc(20px + env(safe-area-inset-bottom)); width:58px; height:58px; border-radius:50%;
    border:none; cursor:pointer; background:linear-gradient(135deg, var(--accent-a), var(--accent-b)); color:#fff;
    display:flex; align-items:center; justify-content:center; z-index:5; transition:transform .15s;
    animation:pulseRing 2.6s ease-out infinite; }
  .fab:hover{ transform:scale(1.06); }
  .fab svg{ width:24px; height:24px; stroke:#fff; }
  @keyframes pulseRing{ 0%{ box-shadow:0 0 0 0 rgba(255,93,143,.4); } 70%{ box-shadow:0 0 0 16px rgba(255,93,143,0); } 100%{ box-shadow:0 0 0 0 rgba(255,93,143,0); } }

  .burst-heart{ position:fixed; z-index:20; pointer-events:none; color:var(--accent-b);
    animation:burstOut .85s ease-out forwards; }
  @keyframes burstOut{ to{ transform:translate(var(--bx),var(--by)) scale(1.1) rotate(var(--br)); opacity:0; } }

  .overlay{ position:fixed; inset:0; background:rgba(10,4,9,.65); backdrop-filter:blur(3px); display:flex; align-items:flex-end;
    justify-content:center; z-index:10; opacity:0; pointer-events:none; transition:opacity .2s; }
  .overlay.open{ opacity:1; pointer-events:auto; }
  @media (min-width:640px){ .overlay{ align-items:center; } }

  .sheet{ width:100%; max-width:480px; background:#250d1a; color:var(--muted); border:1px solid var(--line);
    border-radius:20px 20px 0 0; padding:22px 20px calc(24px + env(safe-area-inset-bottom));
    transform:translateY(16px); transition:transform .2s; max-height:88vh; overflow-y:auto; }
  @media (min-width:640px){ .sheet{ border-radius:20px; } }
  .overlay.open .sheet{ transform:translateY(0); }

  .sheet-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .sheet-title{ font-family:'Fraunces',serif; font-style:italic; font-size:20px; color:#fff3ed; margin:0; }
  .sheet-close{ background:none; border:none; color:var(--muted); cursor:pointer; padding:4px; }
  .sheet-close svg{ width:20px; height:20px; stroke:currentColor; }

  .field{ margin-bottom:16px; }
  .field label{ display:block; font-size:12px; font-weight:600; letter-spacing:.03em; color:var(--muted); margin-bottom:7px; }
  .field input[type=text],.field input[type=url],.field input[type=password],.field textarea{
    width:100%; background:rgba(255,255,255,.05); border:1px solid var(--line); border-radius:10px; padding:11px 13px;
    color:#fff3ed; font-family:'Inter',sans-serif; font-size:14px; resize:none; }
  .field textarea{ font-family:'Caveat',cursive; font-size:19px; min-height:70px; }
  .field input::placeholder,.field textarea::placeholder{ color:#9b7484; }

  .chooser{ display:flex; gap:8px; flex-wrap:wrap; }
  .chooser .opt{ border:1px solid var(--line); background:rgba(255,255,255,.04); color:var(--muted); border-radius:999px;
    padding:8px 14px; font-size:13px; font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:7px; }
  .chooser .opt svg{ width:14px; height:14px; stroke:currentColor; }
  .chooser .opt.selected{ background:#fff3ed; color:var(--ink); border-color:transparent; }

  .err{ color:var(--accent-b); font-size:12px; margin:-6px 0 14px; min-height:14px; }
  .btn{ width:100%; padding:13px; border-radius:12px; border:none; cursor:pointer; font-weight:700; font-size:14px; }
  .btn-primary{ background:linear-gradient(135deg, var(--accent-a), var(--accent-b)); color:#fff; }
  .btn-ghost{ background:none; color:var(--muted); margin-top:8px; }

  .footnote{ text-align:center; font-size:11px; color:#7a4a57; margin-top:36px; letter-spacing:.02em; }
  .config-banner{ max-width:520px; margin:0 auto 26px; background:rgba(255,93,143,.12); border:1px solid rgba(255,93,143,.35);
    color:#ffd9e3; font-size:13px; line-height:1.6; padding:14px 16px; border-radius:12px; }
  .config-banner code{ background:rgba(0,0,0,.25); padding:1px 5px; border-radius:4px; }

  .bell-btn{ position:fixed; left:20px; bottom:calc(20px + env(safe-area-inset-bottom)); width:46px; height:46px;
    border-radius:50%; border:1px solid var(--line); background:rgba(255,255,255,.06); color:var(--muted);
    cursor:pointer; display:flex; align-items:center; justify-content:center; z-index:5; }
  .bell-btn svg{ width:19px; height:19px; stroke:currentColor; }
  .bell-btn.active{ background:rgba(255,93,143,.18); color:var(--accent-b); border-color:rgba(255,93,143,.4); }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; transition-duration:.001ms !important; }
    .ambient{ display:none; }
  }
</style>
</head>

function timeAgo(ts){
  const s=Math.floor((Date.now()-ts)/1000);
  if(s<60) return 'just now';
  const m=Math.floor(s/60); if(m<60) return m+'m ago';
  const h=Math.floor(m/60); if(h<24) return h+'h ago';
  const d=Math.floor(h/24); if(d<7) return d+'d ago';
  const w=Math.floor(d/7); if(w<5) return w+'w ago';
  const mo=Math.floor(d/30); if(mo<12) return mo+'mo ago';
  return Math.floor(d/365)+'y ago';
}

function spawnAmbient(container, count, opts){

    const size = 12 + Math.random()*16;
    el.style.left = Math.random()*100+'%';
    el.style.width = size+'px'; el.style.height = size+'px';
    el.style.setProperty('--drift', (Math.random()*60-30)+'px');
    el.style.setProperty('--maxop', (opts.maxop||0.28));
    el.style.animationDuration = (opts.minDur + Math.random()*opts.varDur)+'s';
    el.style.animationDelay = (Math.random()*opts.delay)+'s';
    const color = [ 'var(--accent-b)','var(--accent-a)','var(--gold)' ][i%3];
    el.innerHTML = `<svg viewBox="0 0 24 24" fill="${color}"><path d="${HEART_PATH}"/></svg>`;
    container.appendChild(el);
  }
}

function runSplash(){

  let i=0;
  (function tick(){
    if(i<=text.length){ span.textContent = text.slice(0,i); i++; setTimeout(tick, 42); }
    else revealSub();
  })();
}

    db = getFirestore(app);
  }catch(err){
    $('#content').innerHTML = `<div class="status error">Couldn't connect to the database. Double-check the Firebase config values.</div>`;
    return;
  }
  maybeShowNotifBanner();

  onSnapshot(doc(db,'config','shared'), snap => {
    if(snap.exists()){
      const data = snap.data();
      config.names = data.names || config.names;
      config.passcode = data.passcode;
    }
    renderNames(); renderFilters(); renderBoard();
  }, err => {
    $('#content').innerHTML = `<div class="status error">Couldn't read the database. Check your Firestore security rules allow read access.</div>`;
  });

  onSnapshot(query(collection(db,'entries'), orderBy('ts','desc')), snap => {
    entries = snap.docs.map(d => ({ id:d.id, ...d.data() }));
    renderBoard();
  }, err => {
    $('#content').innerHTML = `<div class="status error">Couldn't read the database. Check your Firestore security rules allow read access.</div>`;
  });
}

    const note = $('#noteInput').value.trim();
    if(!url){ errEl.textContent="That link doesn't look right."; return; }
    if(!note){ errEl.textContent='Add a little note.'; return; }
    let ok;
    if(editingId){
      ok = await updateEntryDb(editingId, { url, note, category:selCategory, author:selAuthor });
    } else {
      ok = await addEntryDb({ url, note, category:selCategory, author:selAuthor });
      if(ok) notifyPartner(selAuthor, config.names[selAuthor], note);
    }
    if(ok){ closeModal(); burstFromFab(); }
  };
}

$('#fabBtn').onclick = openModal;
overlay.addEventListener('click', (e)=>{ if(e.target===overlay) closeModal(); });
$('#nameA').onclick = () => renameAuthor('a');
$('#nameB').onclick = () => renameAuthor('b');
async function renameAuthor(key){
  if(NOT_CONFIGURED) return;
  const current = config.names[key];
  const next = prompt('Rename:', current);
  if(next && next.trim()){
    config.names[key] = next.trim().slice(0,24);
    await saveConfigDb({ names: config.names });
    renderNames(); renderFilters(); renderBoard();
  }
}

startListeners();
</script>
</body>
</html>
